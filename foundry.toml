[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200

remappings = [
    "v4-hooks-public/=lib/v4-hooks-public/",
    "v4-core/=lib/v4-periphery/lib/v4-core/",
    "v4-periphery/=lib/v4-periphery/",
    "solmate/=lib/solmate/",
    "@uniswap/v4-core/=lib/v4-periphery/lib/v4-core/",
    "@uniswap/v4-periphery/=lib/v4-periphery/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
sepolia = "https://eth-sepolia.g.alchemy.com/v2/YOUR_ALCHEMY_KEY"
mainnet = "https://eth-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_KEY"

[etherscan]
sepolia = { key = "QEAZ4WHRTVYPUSSIUTYJ2MPBMCV6WHMUPN", chain = 11155111 }
mainnet = { key = "YOUR_ETHERSCAN_KEY" }