name: bulloak

on:
  push:
    branches: 
      - main
  pull_request:
  workflow_dispatch:

jobs:
  check:
    strategy:
      fail-fast: true

    name: Testing Tree Structure
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.16.3

      - name: Install Bulloak
        # Install Bulloak if it is not already installed
        # Note if we change the version number, we will need to --force to update cache
        # TODO: switch back to `cargo install` once https://github.com/alexfertel/bulloak/issues/113 is fixed
        run: (cargo binstall bulloak@0.9.2 --no-confirm || true)
        id: install-bulloak

      - name: Run Bulloak checks
        run: bulloak check $(find test -type f -name "*.tree")
        id: check
